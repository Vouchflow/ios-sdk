name: iOS SDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build & test (unit + integration)
        # Runs VouchflowSDKTests and VouchflowSDKIntegrationTests.
        # On a fresh Simulator (no Face ID, no passcode) the integration tests that need
        # biometric or passcode skip via XCTSkip; the enrollment and no-auth tests run fully.
        run: |
          xcodebuild test \
            -scheme VouchflowSDK \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest'

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Bump patch version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          CURRENT=$(cat VERSION)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "$NEW_VERSION" > VERSION
          git add VERSION
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin main
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build XCFramework
        run: |
          set -euo pipefail
          SCHEME="VouchflowSDK"
          VERSION="${{ steps.bump.outputs.version }}"

          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath build/ios.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -archivePath build/ios-sim.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

          IOS_FW=$(find build/ios.xcarchive -name "${SCHEME}.framework" -type d | head -1)
          SIM_FW=$(find build/ios-sim.xcarchive -name "${SCHEME}.framework" -type d | head -1)
          echo "iOS fw:  $IOS_FW"
          echo "Sim fw:  $SIM_FW"

          xcodebuild -create-xcframework \
            -framework "$IOS_FW" \
            -framework "$SIM_FW" \
            -output "build/VouchflowSDK.xcframework"

          cd build
          zip -r "VouchflowSDK-${VERSION}.zip" VouchflowSDK.xcframework

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          files: build/VouchflowSDK-${{ steps.bump.outputs.version }}.zip
          generate_release_notes: true
