name: iOS SDK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build & test
        run: |
          xcodebuild test \
            -scheme VouchflowSDK \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -quiet

  bump-version:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and push tag
        run: |
          CURRENT=$(cat VERSION)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "$NEW_VERSION" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin main
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build XCFramework
        run: |
          set -euo pipefail
          SCHEME="VouchflowSDK"
          VERSION="${GITHUB_REF_NAME#v}"

          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath build/ios.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -quiet

          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -archivePath build/ios-sim.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -quiet

          xcodebuild -create-xcframework \
            -framework build/ios.xcarchive/Products/Library/Frameworks/VouchflowSDK.framework \
            -framework build/ios-sim.xcarchive/Products/Library/Frameworks/VouchflowSDK.framework \
            -output "build/VouchflowSDK.xcframework"

          cd build
          zip -r "VouchflowSDK-${VERSION}.zip" VouchflowSDK.xcframework
          echo "ARTIFACT=build/VouchflowSDK-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
