name: iOS SDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build & test (unit + integration)
        timeout-minutes: 30
        # Two-pass test run against the same Simulator:
        #
        # Pass 1 — no biometric enrolled (fresh Simulator):
        #   Unit tests, EnrollmentIntegrationTests, and no-auth PasskeyType tests run fully.
        #   Biometric test skips via canEvaluatePolicy guard.
        #   Passcode test skips via #if targetEnvironment(simulator) guard.
        #
        # Pass 2 — Face ID enrolled (xcrun simctl io biometricEnroll):
        #   Biometric test runs; a background watcher sends biometricMatch every second
        #   to accept the LAContext prompt while verify() is suspended.
        #   No-auth tests excluded via -skip-testing (verify() would succeed with biometric
        #   active, failing their XCTFail("must throw") assertion).
        #   Passcode test still skips on Simulator.
        run: |
          set -euo pipefail

          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone 15" | head -1 | grep -oE '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}')
          echo "Simulator device ID: $DEVICE_ID"

          # SPM .testTarget on Simulator can't get Keychain entitlements (xctest
          # host binary swallows them), so KeychainManager auto-falls back to
          # UserDefaults the first time it sees errSecMissingEntitlement on
          # Simulator. The fallback branch is excluded from real-device builds
          # via #if targetEnvironment(simulator). Real-device coverage of the
          # Keychain path is verified manually on a connected Mac before release.
          # -test-timeouts-enabled YES + -default-test-execution-time-allowance
          # makes any individual test that hangs >120s fail with a timeout
          # error instead of stalling the whole step. Necessary because the
          # noAuth tests on iOS 17.5 Simulator can hang in LAContext when no
          # biometric/passcode is configured.
          # Capture pass 1 exit code but always continue to pass 2 — the
          # biometric test only runs in pass 2 after Face ID is enrolled,
          # and we want it to surface even if a flaky pass 1 test failed.
          set +e
          xcodebuild test \
            -scheme VouchflowSDK \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 120 \
            -maximum-test-execution-time-allowance 180
          PASS1_EXIT=$?
          set -e

          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl io "$DEVICE_ID" biometricEnroll

          # Flag-file watcher: portable across macOS/Linux, no setsid needed,
          # and the loop self-terminates when the flag is removed (no kill /
          # wait dance, no orphan-sleep child process to hang the runner).
          WATCHER_FLAG=$(mktemp /tmp/biom_watcher.XXXXXX)
          (while [ -f "$WATCHER_FLAG" ]; do
             xcrun simctl io "$DEVICE_ID" biometricMatch 2>/dev/null
             sleep 1
           done) &

          # -test-timeouts-enabled YES + -default-test-execution-time-allowance
          # makes any individual test that hangs >120s fail with a timeout
          # error instead of stalling the whole step. Necessary because the
          # noAuth tests on iOS 17.5 Simulator can hang in LAContext when no
          # biometric/passcode is configured.
          set +e
          xcodebuild test \
            -scheme VouchflowSDK \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 120 \
            -maximum-test-execution-time-allowance 180 \
            -only-testing "VouchflowSDKIntegrationTests/PasskeyTypeIntegrationTests/test_biometricEnrolled_enrollAndVerifySucceeds"
          PASS2_EXIT=$?
          set -e

          rm -f "$WATCHER_FLAG"
          wait 2>/dev/null || true

          # Fail the step if either pass had a real failure.
          if [ "${PASS1_EXIT:-0}" != "0" ] || [ "${PASS2_EXIT:-0}" != "0" ]; then
            echo "::error::test failures (pass1=$PASS1_EXIT pass2=$PASS2_EXIT)"
            exit 1
          fi

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Bump patch version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          CURRENT=$(cat VERSION)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "$NEW_VERSION" > VERSION
          git add VERSION
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin main
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build XCFramework
        run: |
          set -euo pipefail
          SCHEME="VouchflowSDK"
          VERSION="${{ steps.bump.outputs.version }}"

          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath build/ios.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -archivePath build/ios-sim.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

          IOS_FW=$(find build/ios.xcarchive -name "${SCHEME}.framework" -type d | head -1)
          SIM_FW=$(find build/ios-sim.xcarchive -name "${SCHEME}.framework" -type d | head -1)
          echo "iOS fw:  $IOS_FW"
          echo "Sim fw:  $SIM_FW"

          xcodebuild -create-xcframework \
            -framework "$IOS_FW" \
            -framework "$SIM_FW" \
            -output "build/VouchflowSDK.xcframework"

          cd build
          zip -r "VouchflowSDK-${VERSION}.zip" VouchflowSDK.xcframework

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          files: build/VouchflowSDK-${{ steps.bump.outputs.version }}.zip
          generate_release_notes: true
